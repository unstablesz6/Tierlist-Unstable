<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unstablesz6 Tiers</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="authModal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="auth-top">
        <div class="modal-logo">U</div>
        <div>
          <h2>Unstablesz6 Tiers</h2>
          <p>Login or create your ID to continue</p>
        </div>
      </div>

      <div class="auth-switch">
        <button id="loginTab" class="switch-btn active" type="button">Login</button>
        <button id="signupTab" class="switch-btn" type="button">Create Account</button>
      </div>

      <div id="loginSection">
        <form id="loginForm">
          <input type="text" id="loginIdInput" placeholder="Enter your ID" maxlength="20" required />
          <input type="password" id="loginPasswordInput" placeholder="Enter your password" required />
          <button type="submit">Login</button>
        </form>
      </div>

      <div id="signupSection" class="hidden">
        <form id="signupForm">
          <input type="text" id="signupIdInput" placeholder="Choose your ID" maxlength="20" required />
          <input type="password" id="signupPasswordInput" placeholder="Choose your password" required />
          <button type="submit">Create Account</button>
        </form>
        <p class="modal-note">Editor IDs: <strong>wemmbu</strong>, <strong>kaiser</strong></p>
      </div>
    </div>
  </div>

  <div class="page">
    <header class="navbar">
      <div class="logo-wrap">
        <div class="logo-box">U</div>
        <div class="logo-text">Unstablesz6 Tiers</div>
      </div>

      <nav class="nav-links">
        <a href="#" class="active">Home</a>
        <a href="#">Rankings</a>
        <a href="https://discord.gg/fdN6d2W9Br" target="_blank" rel="noopener noreferrer">Discords</a>
        <a href="#">API Docs</a>
      </nav>

      <div class="top-actions">
        <input type="text" id="searchInput" placeholder="Search player..." />
        <button id="openAuthBtn" class="id-btn">Account</button>
        <button id="logoutBtn" class="ghost-btn hidden">Logout</button>
      </div>
    </header>

    <main class="main">
      <section class="category-bar">
        <button class="cat-btn active" data-category="Overall">🏆 Overall</button>
        <button class="cat-btn" data-category="Cart">🛒 Cart</button>
        <button class="cat-btn" data-category="Vanilla">🛡 Vanilla</button>
        <button class="cat-btn" data-category="UHC">❤ UHC</button>
        <button class="cat-btn" data-category="Pot">🧪 Pot</button>
        <button class="cat-btn" data-category="NethOP">☠ NethOP</button>
        <button class="cat-btn" data-category="SMP">🟢 SMP</button>
        <button class="cat-btn" data-category="Sword">🗡 Sword</button>
        <button class="cat-btn" data-category="Axe">🔨 Axe</button>
        <button class="cat-btn" data-category="Mace">🔩 Mace</button>
      </section>

      <section class="content-grid">
        <div class="rankings-panel">
          <div class="panel-header">
            <div>
              <h2 id="currentCategoryTitle">Overall Rankings</h2>
              <p>Competitive player placements</p>
            </div>

            <div class="panel-right-info">
              <div class="info-chip">Information</div>
              <div class="server-chip">
                <span>Allowed Servers</span>
                <strong>catpvp.xyz • mcpvp.club</strong>
              </div>
              <div class="user-pill">
                ID: <span id="currentUserId">Not logged in</span>
                <span id="editorMark" class="editor-mark hidden">EDITOR</span>
              </div>
            </div>
          </div>

          <div class="ranking-head">
            <div>#</div>
            <div>Player</div>
            <div>Region</div>
            <div>Tiers</div>
          </div>

          <div id="rankingList" class="ranking-list"></div>
        </div>

        <aside class="side-panel">
          <div id="editorPanel" class="info-card hidden">
            <h3>Add Player</h3>
            <form id="playerForm">
              <input type="text" id="playerName" placeholder="Player name" required />
              
              <select id="playerCategory" required>
                <option value="">Select category</option>
                <option value="Overall">Overall</option>
                <option value="Cart">Cart</option>
                <option value="Vanilla">Vanilla</option>
                <option value="UHC">UHC</option>
                <option value="Pot">Pot</option>
                <option value="NethOP">NethOP</option>
                <option value="SMP">SMP</option>
                <option value="Sword">Sword</option>
                <option value="Axe">Axe</option>
                <option value="Mace">Mace</option>
              </select>

              <select id="playerRegion" required>
                <option value="">Select region</option>
                <option value="NA">NA</option>
                <option value="EU">EU</option>
                <option value="AS">AS</option>
              </select>

              <input type="text" id="playerTiers" placeholder="Example: HT1, LT2, HT3" required />
              <input type="text" id="playerNote" placeholder="Example: Combat Master (330 points)" />
              <button type="submit">Add Player</button>
            </form>
          </div>
        </aside>
      </section>
    </main>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
